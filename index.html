<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arcane Glitch</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell" id="app">
      <section class="menu-screen" aria-labelledby="game-title">
        <div class="background-grid" aria-hidden="true"></div>
        <div class="rune-rain" id="rune-rain" aria-hidden="true"></div>
        <div class="menu-hex-patches" aria-hidden="true">
          <div class="element-hex-patch life-patch">
            <img src="hexes/jungle_hex_basic1.png" alt="">
            <img src="hexes/jungle_hex_basic2.png" alt="">
            <img src="hexes/jungle_hex_basic3.png" alt="">
            <img src="hexes/jungle_hex_basic4.png" alt="">
          </div>
          <div class="element-hex-patch surge-patch">
            <img src="hexes/cindera_hex_basic1.png" alt="">
            <img src="hexes/cindera_hex_basic2.png" alt="">
            <img src="hexes/cindera_hex_basic3.png" alt="">
            <img src="hexes/cindera_hex_basic4.png" alt="">
          </div>
          <div class="element-hex-patch mind-patch">
            <img src="hexes/conclave_hex_basic1.png" alt="">
            <img src="hexes/conclave_hex_basic2.png" alt="">
            <img src="hexes/conclave_hex_basic3.png" alt="">
            <img src="hexes/conclave_hex_basic4.png" alt="">
          </div>
          <div class="element-hex-patch void-patch">
            <img src="hexes/parcel7_hex_basic1.png" alt="">
            <img src="hexes/parcel7_hex_basic2.png" alt="">
            <img src="hexes/parcel7_hex_basic3.png" alt="">
            <img src="hexes/parcel7_hex_basic4.png" alt="">
          </div>
        </div>

        <div class="menu-content">
          <p class="signal">Q-Dara Haven Interface</p>
          <h1 id="game-title">Arcane Glitch</h1>
          <p class="tagline">Bind the Rift. Rewrite the broken world.</p>
          <button class="primary-action" id="start-run" type="button">
            Start Run
          </button>
          <button class="secondary-action load-game-action" id="load-game" type="button">
            Load Game
          </button>
          <a class="secondary-action menu-link-action" href="how-to-play.html">
            How to Play
          </a>
          <input class="save-file-input" id="load-game-file" type="file" accept="application/json,.json">
          <button class="secondary-action test-mode-action" id="test-mode" type="button">
            Test Mode
          </button>
        </div>

        <div class="rune-strip" aria-hidden="true">
          <img src="pixel art/mind1_px_large.png" alt="">
          <img src="pixel art/surge1_px_large.png" alt="">
          <img src="pixel art/void1_px_large.png" alt="">
          <img src="pixel art/life1_px_large.png" alt="">
        </div>
      </section>
    </main>

    <script src="metadata/glitchspawn.js"></script>
    <script src="metadata/programs.js"></script>
    <script src="metadata/artifacts.js"></script>
    <script src="main.js"></script>
  </body>
</html>
